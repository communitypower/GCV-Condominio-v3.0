services:
  db:
    image: postgres:16-alpine
    container_name: gcv-postgres
    restart: always
    environment:
      POSTGRES_DB: gcv_condominio
      POSTGRES_USER: gcv_user
      POSTGRES_PASSWORD: gcv_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gcv_user -d gcv_condominio"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: gcv-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - APP_URL=http://localhost:3000
      - SESSION_SECRET=${SESSION_SECRET:-gcv_local_compose_secret}
      - BETA_ALLOWED_EMAILS=${BETA_ALLOWED_EMAILS:-sindico@gcv.com.br,zelador@gcv.com.br,carlos.ramos@email.com,mariana.alves@email.com}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.5-flash}
      - ENABLE_AI_ASSISTANT=${ENABLE_AI_ASSISTANT:-false}
      - ENABLE_GITHUB_INTEGRATION=${ENABLE_GITHUB_INTEGRATION:-false}
      - ENABLE_DEMO_EXPORTS=${ENABLE_DEMO_EXPORTS:-false}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-local-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-local-google-client-secret}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-local-microsoft-client-id}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-local-microsoft-client-secret}
      - MICROSOFT_TENANT_ID=${MICROSOFT_TENANT_ID:-common}
      - DATABASE_URL=postgresql://gcv_user:gcv_password@db:5432/gcv_condominio?schema=public
    command: sh -c "npm run db:migrate:deploy && npm run db:seed && npm run start"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
