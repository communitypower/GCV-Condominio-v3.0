name: GCV SaaS CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run audit

      - name: Typecheck
        run: npm run lint

      - name: Build application
        run: npm run build

  api-smoke:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    needs: build-and-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gcv_condominio
          POSTGRES_USER: gcv_user
          POSTGRES_PASSWORD: gcv_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gcv_user -d gcv_condominio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PORT: 3200
      NODE_ENV: test
      APP_URL: http://localhost:3200
      BASE_URL: http://localhost:3200/api/v1
      DATABASE_URL: postgresql://gcv_user:gcv_password@localhost:5432/gcv_condominio?schema=public
      SESSION_SECRET: ci_test_secret
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      MICROSOFT_CLIENT_ID: test-microsoft-client-id
      MICROSOFT_CLIENT_SECRET: test-microsoft-client-secret
      MICROSOFT_TENANT_ID: common
      ENABLE_AI_ASSISTANT: "false"
      ENABLE_GITHUB_INTEGRATION: "false"
      ENABLE_DEMO_EXPORTS: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application and seed bundle
        run: npm run build

      - name: Verify migrations on clean database
        run: npm run db:migrate:verify

      - name: Seed database
        run: npm run db:seed

      - name: Run OAuth test harness
        run: npm test

      - name: Start test server
        run: |
          npm run start > /tmp/gcv-server.log 2>&1 &
          echo $! > /tmp/gcv-server.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:3200/readyz; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/gcv-server.log
          exit 1

      - name: Run API smoke tests
        run: npm run test:api

      - name: Stop test server
        if: always()
        run: |
          if [ -f /tmp/gcv-server.pid ]; then
            kill "$(cat /tmp/gcv-server.pid)" || true
          fi
          cat /tmp/gcv-server.log || true

  browser-e2e:
    name: Browser E2E Tests
    runs-on: ubuntu-latest
    needs: api-smoke

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gcv_condominio
          POSTGRES_USER: gcv_user
          POSTGRES_PASSWORD: gcv_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gcv_user -d gcv_condominio"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      CI: "true"
      PORT: 3300
      NODE_ENV: test
      APP_URL: http://localhost:3300
      PLAYWRIGHT_BASE_URL: http://localhost:3300
      DATABASE_URL: postgresql://gcv_user:gcv_password@localhost:5432/gcv_condominio?schema=public
      SESSION_SECRET: ci_browser_e2e_session_secret
      E2E_TEST_SECRET: ci_browser_e2e_endpoint_secret
      ENABLE_E2E_TESTING: "true"
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      MICROSOFT_CLIENT_ID: test-microsoft-client-id
      MICROSOFT_CLIENT_SECRET: test-microsoft-client-secret
      MICROSOFT_TENANT_ID: common
      ENABLE_AI_ASSISTANT: "false"
      ENABLE_GITHUB_INTEGRATION: "false"
      ENABLE_DEMO_EXPORTS: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build application and seed bundle
        run: npm run build

      - name: Apply migrations and seed database
        run: |
          npm run db:migrate:deploy
          npm run db:seed

      - name: Start test server
        run: |
          npm run start > /tmp/gcv-e2e-server.log 2>&1 &
          echo $! > /tmp/gcv-e2e-server.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:3300/readyz; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/gcv-e2e-server.log
          exit 1

      - name: Run Playwright critical workflows
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop test server
        if: always()
        run: |
          if [ -f /tmp/gcv-e2e-server.pid ]; then
            kill "$(cat /tmp/gcv-e2e-server.pid)" || true
          fi
          cat /tmp/gcv-e2e-server.log || true
